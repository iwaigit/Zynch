name: Web App CI

on:
  push:
    branches: ["main"]
    paths:
      - 'web-app/**'
  pull_request:
    branches: ["main"]
    paths:
      - 'web-app/**'

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './web-app/package-lock.json'

      - name: Install dependencies
        run: npm ci
        working-directory: ./web-app

      - name: Lint check
        run: npm run lint
        working-directory: ./web-app
        continue-on-error: true # No bloqueamos al inicio para no frustrar el avance

      - name: Type check
        run: npx tsc --noEmit
        working-directory: ./web-app

      - name: Build check
        run: npm run build
        working-directory: ./web-app
