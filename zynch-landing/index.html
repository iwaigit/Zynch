<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zynch | Próximamente</title>
    <!-- SEO Básico -->
    <meta name="description" content="Zynch - La plataforma definitiva para la gestión de servicios VIP. Próximamente.">

    <!-- Fuentes premium de Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Paleta Oficial Zynch */
            --bg-dark: #09090b;
            --primary: #FF2D55;
            --secondary: #00F0FF;
            --text-light: #f8fafc;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Efecto de resplandor dinámico de fondo (Glassmorphism & Gradients) */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 45, 85, 0.15) 0%, rgba(0, 240, 255, 0.1) 50%, rgba(9, 9, 11, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            animation: pulse-glow 8s infinite alternate;
        }

        @keyframes pulse-glow {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 1;
            }
        }

        .container {
            z-index: 1;
            text-align: center;
            padding: 2rem;
            animation: fade-in 1.5s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: lowercase;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 45, 85, 0.1);
            border: 1px solid rgba(255, 45, 85, 0.3);
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .subtitle {
            font-size: 1.5rem;
            font-weight: 300;
            color: #a1a1aa;
            margin-bottom: 4rem;
            max-width: 600px;
            line-height: 1.4;
        }

        .subtitle strong {
            color: var(--text-light);
            font-weight: 500;
        }

        /* Contador Regresivo */
        .countdown {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            min-width: 100px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .time-box:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 240, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .number {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
            background: linear-gradient(180deg, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--primary);
            font-weight: 500;
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.9rem;
            color: #52525b;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 4rem;
            }

            .subtitle {
                font-size: 1.2rem;
            }

            .countdown {
                gap: 1rem;
            }

            .time-box {
                padding: 1rem 1.5rem;
                min-width: 70px;
            }

            .number {
                font-size: 2.5rem;
            }

            .label {
                font-size: 0.7rem;
            }
        }
    </style>
</head>

<body>
    <!-- Efecto visual de fondo -->
    <div class="glow"></div>

    <div class="container">
        <div class="badge">Próximo Lanzamiento</div>
        <div class="logo">zynch.app</div>
        <div class="subtitle">Estamos construyendo el **SaaS élite** que redefinirá la gestión de tu negocio
            independiente.</div>

        <div class="countdown" id="countdown">
            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">Días</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">Horas</div>
            </div>
            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">Minutos</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Segundos</div>
            </div>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Zynch. Arquitectura por IWAI.
    </div>

    <!-- Script de lógica de cuenta regresiva para 2 meses (60 días aprox) -->
    <script>
        // Configurar la fecha objetivo a 2 meses desde hoy (Mayo 9, 2026 aprox)
        const targetDate = new Date();
        targetDate.setMonth(targetDate.getMonth() + 2);

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate.getTime() - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<div class='subtitle' style='margin:0'>¡Ya estamos en vivo!</div>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Actualizar el DOM agregando un cero inicial si es menor a 10
            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Actualizar cada segundo
        setInterval(updateCountdown, 1000);
        updateCountdown(); // Llamada inicial instantánea
    </script>
</body>

</html>
